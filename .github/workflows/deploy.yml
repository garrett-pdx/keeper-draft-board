name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          GITHUB_PAGES: 'true'
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url || steps.deploy4.outputs.page_url }}
    steps:
      # GitHub Pages occasionally fails a deployment instantly with
      # "Deployment failed, try again later" for reasons opaque to the repo
      # (confirmed: GitHub status page shows no incident, branch/environment
      # config is correct). Immediate back-to-back retries aren't always
      # enough — confirmed live: 3 attempts a few seconds apart all failed,
      # while a fresh attempt ~2 minutes later succeeded first try — so this
      # backs off between attempts instead of hammering it. Retry in-job
      # rather than needing a human to notice and re-run the workflow.
      - id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Back off before retry 1
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30
      - id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Back off before retry 2
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 60
      - id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Back off before retry 3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure' && steps.deploy3.outcome == 'failure'
        run: sleep 90
      - id: deploy4
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure' && steps.deploy3.outcome == 'failure'
        uses: actions/deploy-pages@v4
